<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <script>
        let input = parseFloat(prompt('cm 단위를 입력해주세요', '입력'));
        let inch = input / 2.54;
        let feet = input / 12;

        alert(input + '은' + inch + '인치' + feet + '피트입니다.' );

        let radius = parseFloat(prompt('반지름을 입력해주세요.', '입력'));
        let height = parseFloat(prompt('높이를 입력해주세요.', '입력'));
        let volume = radius * radius * 3.14 * height;

        alert('부피는' + volume + '입니다.');

        let input1 = parseFloat(prompt('네 자리 정수를 입력해주세요', '입력'));
        let num_1 = parseInt(input1 / 1000);
        let num_2 = parseInt(input1 % 1000 / 100);
        let num_3 = parseInt(input1 % 100 / 10);
        let num_4 = parseInt(input1 % 10);

        alert(num_1 + '.' + num_2 + '.' + num_3 + '.' + num_4)
    </script>
</body>
</html>
